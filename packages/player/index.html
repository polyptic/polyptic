<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Polyptic Player</title>
    <!-- Favicons (brand/, synced by brand/generate.sh). Never seen on a wall screen — the player runs
         fullscreen with no tab strip — but it's what identifies the tab when a human opens the page to
         debug. These absolute paths are rewritten to the `/player/` base at build (vite.config.ts). -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Idle-splash typography (POL-27) is now SELF-HOSTED and bundled by Vite — see src/main.ts.
         It used to be fetched from fonts.googleapis.com, which was always wrong here: a wall box is
         meant to reach the control plane and NOTHING else (docs/DEPLOY.md), so on an isolated VLAN
         that request could only fail. The earlier fix made it non-blocking (`media="print"` + an
         onload swap) so a white screen was no longer the cost — but the request was still made, and
         on a boot where the network was still settling Chrome aborted it with ERR_NETWORK_CHANGED
         along with the content itself (POL-86, real hardware). The font now ships with the player,
         from the same origin as everything else, so there is no third-party request left to fail. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
