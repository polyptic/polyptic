<!--
  Polyptic mark — inverted variant for dark backgrounds (matches the console's dark theme).
  Source of truth: packages/console/src/components/Logo.vue. Keep in sync with that component.
  Holder = primary token (#fafafa); panels = primary-fg token (#18181b), side panels at 62% opacity.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Polyptic">
  <rect width="32" height="32" rx="8.64" fill="#fafafa"/>
  <g transform="translate(3.84 3.84) scale(0.76)">
    <polygon points="6.6,11 12.3,8.2 12.3,23.8 6.6,21" fill="#18181b" opacity=".62"/>
    <polygon points="25.4,11 19.7,8.2 19.7,23.8 25.4,21" fill="#18181b" opacity=".62"/>
    <rect x="13.1" y="8" width="5.8" height="16" fill="#18181b"/>
  </g>
</svg>
