apiVersion: v2
name: polyptic
description: >-
  Polyptic control plane (server) — a generic, self-hostable display-wall /
  kiosk-fleet orchestrator. This chart deploys ONLY the server (REST + WebSocket
  control plane on :8080). On-device agents arrive in the netboot live image the
  control plane serves (see docs/ONBOARDING.md / D58), NOT in Kubernetes.
type: application

# Chart version — bump on any change to the chart itself.
version: 0.1.0

# The app (server) version this chart deploys. Mirror your image tag / release.
appVersion: "0.1.0"

home: https://github.com/polyptic/polyptic
sources:
  - https://github.com/polyptic/polyptic
keywords:
  - polyptic
  - display-wall
  - kiosk
  - signage
  - orchestrator
maintainers:
  - name: Polyptic Maintainers
    email: maintainers@polyptic.example

# Database (POL-123/D108): the chart brings its OWN Postgres — a first-party StatefulSet in
# templates/postgres.yaml, on by default (postgresql.enabled), NOT a subchart. There is
# deliberately no `postgresql` dependency here: a bundled 60-line StatefulSet has no vendored
# tarball to keep in step (cf. cert-manager below) and no upgrade path we don't control.
# Bring-your-own Postgres stays first-class: postgresql.enabled=false + externalDatabase.url.
#
# cert-manager (POL-70/D89): condition-gated on letsEncrypt.enabled, so deployments that
# don't opt in pull nothing extra. The chart tarball is VENDORED under charts/ (and the
# .helmignore no longer excludes *.tgz) so a bare git checkout renders/installs offline —
# `helm dependency update` refreshes it when bumping the version. If your cluster already
# runs cert-manager, keep letsEncrypt.enabled=false and create your Issuer/Certificate
# out-of-band (templates/lets-encrypt.yaml shows the exact resources to copy).
dependencies:
  - name: cert-manager
    repository: https://charts.jetstack.io
    version: v1.16.3
    condition: letsEncrypt.enabled
