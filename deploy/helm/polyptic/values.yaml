# Default values for the Polyptic control-plane (server) chart.
# This file mirrors deploy/docker-compose.yml + deploy/server.Dockerfile +
# deploy/.env.example. Override on `helm install -f my-values.yaml` or `--set`.

# -- Number of server replicas. The control plane is currently a single-writer
# process (it holds the desired-state authority + in-memory WS hubs); keep this
# at 1 unless you have introduced sticky sessions / shared coordination.
replicaCount: 1

image:
  # Container image for the server, built from deploy/server.Dockerfile.
  repository: ghcr.io/polyptic/polyptic-server
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when empty.
  tag: ""

# Image pull secrets for private registries, e.g. [{ name: regcred }].
imagePullSecrets: []

# Override chart name / fullname in resource names.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # If true, create a ServiceAccount for the server pods.
  create: true
  # Annotations to add to the ServiceAccount (e.g. IRSA / Workload Identity).
  annotations: {}
  # Name to use; generated from the fullname template when empty.
  name: ""

# Extra annotations / labels applied to the Deployment's pod template.
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  # The Service port. The container always listens on containerPort (8080).
  port: 8080
  # Optional fixed nodePort when type=NodePort.
  nodePort: ""
  annotations: {}

# The port the server binds inside the container (server reads PORT). Keep 8080
# to match server.Dockerfile (EXPOSE 8080) and the Service default.
containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  host: polyptic.example.com
  # Path + pathType for the single host rule.
  path: /
  pathType: Prefix
  tls:
    # When enabled, emit a tls block for `host` using `secretName`.
    enabled: false
    secretName: polyptic-tls

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Liveness / readiness both hit the UNGATED top-level /healthz (NOT /api/v1).
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Prometheus scrape annotations for the UNGATED top-level /metrics endpoint.
# These are merged onto the pod template; a ServiceMonitor (Prometheus Operator)
# is out of scope but the annotations work with the standard kubernetes_sd scrape.
metrics:
  enabled: true
  path: /metrics
  port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Extra raw env vars appended verbatim to the container (list of {name,value} or
# valueFrom maps). Use for anything not surfaced as a first-class value below.
extraEnv: []

# ─────────────────────────────────────────────────────────────────────────────
# Application configuration (mirrors deploy/.env.example).
# Non-secret values land in a ConfigMap; secret values land in a Secret.
# ─────────────────────────────────────────────────────────────────────────────
config:
  # Registry backend: `postgres` (durable, default) or `memory` (ephemeral test double).
  store: postgres

  # Comma-separated allowed CORS origins for the console/player (browsers send the
  # session cookie cross-origin, so this MUST list every browser origin). In prod
  # this is typically your HTTPS console origin.
  corsOrigin: "https://polyptic.example.com"

  # Public ORIGIN of this deployment (scheme://host[:port], no path). The server hands each wall box
  # a player URL derived from it — the chart appends the /player path the single image serves the
  # player app under, so do NOT add it yourself. Must be reachable from the wall boxes.
  playerBaseUrl: "https://polyptic.example.com"

  # Fastify log level: trace|debug|info|warn|error|fatal.
  logLevel: info

  # NODE_ENV — "production" implies secure cookies unless SECURE_COOKIES is set.
  nodeEnv: production

  # AUTH GATE (Phase 3f / D29). Leave true for any real deployment. The e2e suite
  # runs with this false; NEVER ship a public deployment with auth disabled.
  authEnabled: true

  # Mark session cookies `secure` (HTTPS-only). PRODUCTION over HTTPS MUST set this
  # true (see README "Production note"). Left true here because the prod default is HTTPS.
  secureCookies: true

  # Capture cadence for the live-preview thumbnails (server → agent server/capture
  # poll interval, milliseconds). Empty uses the server's built-in default.
  captureIntervalMs: ""

# ─────────────────────────────────────────────────────────────────────────────
# Media uploads (Phase 7).
#   Operators can UPLOAD images/videos (POST /api/v1/media, gated) on top of
#   LINKING external media URLs (Phase 3c). Uploads are streamed to a disk volume
#   (Polyptic does NOT use object storage) and served back, ungated, from the
#   top-level GET /media/:id with HTTP Range support (so video can seek). The
#   server reads MEDIA_DIR / MEDIA_PUBLIC_BASE / MEDIA_MAX_BYTES (configmap).
# ─────────────────────────────────────────────────────────────────────────────
media:
  # Directory the server writes uploads to. This is also the volumeMount path for
  # the media volume below — keep them identical.
  dir: /var/lib/polyptic/media

  # Absolute base URL prepended to /media/<id> when an upload becomes a
  # ContentSource.url. MUST be reachable by the players/public wall — in prod this
  # is normally your public HTTPS origin (e.g. https://polyptic.example.com).
  publicBase: "https://polyptic.example.com"

  # Maximum accepted upload size, in bytes (streamed; rejected past this). ~200MB.
  # Quoted to keep Helm from coercing the large integer to scientific-notation float.
  maxBytes: "209715200"

  persistence:
    # When true, back MEDIA_DIR with a PersistentVolumeClaim so uploads survive
    # pod restarts/redeploys. When false, the pod uses an emptyDir (ephemeral —
    # uploads lost on restart; dev only).
    enabled: true
    # Use a pre-existing PVC instead of letting the chart create one. When set,
    # no PVC is rendered and the deployment mounts this claim directly.
    existingClaim: ""
    # PVC access mode(s). RWO suits the single-writer control plane; switch to
    # ReadWriteMany only if you scale the server and your storage supports it.
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    # StorageClass for the PVC. "" uses the cluster default; "-" disables dynamic
    # provisioning (bind to a pre-created PV).
    storageClass: ""

# ─────────────────────────────────────────────────────────────────────────────
# Traefik IngressRoute (the CRD), the recommended exposure on a Traefik cluster
# — an alternative to the generic `ingress:` above (enable one, not both).
#
# TWO hosts by design:
#   * `host` (HTTPS, websecure) — console + player + REST + the three WS
#     channels. These are deliberately ONE same-origin host: the operator
#     session is an http-only cookie, and splitting console/api onto different
#     subdomains would break it. WebSockets pass through Traefik natively.
#   * `bootHost` (PLAIN HTTP, web) — the boot depot only (/boot, /grub, /dist,
#     /install). GRUB speaks no TLS, so this router must stay http.
#     THIS hostname is what you bake into boot media and live ISOs:
#         POLYPTIC_BASE=http://boot.polyptic.example.com deploy/build-boot-medium.sh
#         POLYPTIC_BASE=http://boot.polyptic.example.com ... deploy/build-live-iso.sh arm64
#     A stable name here is the fix for "the server's IP changed and every
#     baked medium went stale."
# ─────────────────────────────────────────────────────────────────────────────
ingressRoute:
  enabled: false
  host: polyptic.example.com
  entryPoints:
    - websecure
  tls:
    # Traefik ACME resolver name (e.g. letsencrypt) — or set secretName instead.
    certResolver: ""
    # Pre-provisioned TLS secret for `host`.
    secretName: ""
  # The plain-HTTP boot-depot host. Empty disables the boot router.
  bootHost: boot.polyptic.example.com
  bootEntryPoints:
    - web

# ─────────────────────────────────────────────────────────────────────────────
# Netboot depot (POL-33…41).
#   The server serves the live image (GET /dist/image/<arch>/…) and the signed
#   boot loaders (GET /dist/boot/<file>) from two directories; both live on one
#   depot volume so the rebuild Jobs and the server share the artifacts.
#   NOTE: GRUB speaks PLAIN HTTP (no TLS) — netbooting boxes must reach
#   the server over http:// (a LoadBalancer/NodePort on the management LAN), not
#   the HTTPS Ingress. Consoles/players keep HTTPS; only the boot path is
#   http-by-contract.
# ─────────────────────────────────────────────────────────────────────────────
netboot:
  # Mount path of the depot volume; IMAGE_DIST_DIR/BOOT_DIST_DIR derive from it
  # (<depotDir>/image and <depotDir>/boot).
  depotDir: /var/lib/polyptic/depot
  # Build the downloadable boot medium (polyptic-boot.img + signed loaders) onto
  # the depot via a per-revision Job, so the console's bootloader download works
  # from minute one. Needs an address to bake (imageUpdates.bakeBase or
  # ingressRoute.bootHost) and a persistent depot; without either the Job is
  # skipped. POL-69: the Job also bakes the CURRENT enrolment token (lifted from
  # the server's /boot/grub.cfg at build time) and the local Wi-Fi payload from
  # the depot, so the downloaded stick boots Wi-Fi-only screens on gated fleets
  # — which makes the .img a credential there, and a token rotation wants a
  # `helm upgrade` re-bake + re-flash of Wi-Fi sticks. Before the first image
  # build it falls back to the LEAN wired-only medium, loudly.
  autoBuildMedium: true
  persistence:
    # Back the depot with a PVC. The live image is rebuilt nightly/weekly and
    # must survive pod restarts — without persistence every restart would need a
    # fresh full rebuild before boxes could netboot.
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    # Sized for build retention (POL-45). A live image is ~1.5–2GB, the weekly
    # full rebuild caches the ~3GB base ISO alongside it, and the depot keeps
    # `imageUpdates.retainBuilds` builds PER ARCH so an operator can roll back:
    #   3 builds x 2 arches x ~2GB  +  ~3GB base ISO  +  a build in flight
    # 30Gi covers the default. Shrink it if you retain fewer builds or one arch.
    size: 30Gi
    storageClass: ""

# ─────────────────────────────────────────────────────────────────────────────
# Automated image updates (POL-41/POL-43), Kubernetes-native.
#   The server keeps its two scheduled cycles (Console ▸ Settings ▸ Image
#   updates): the NIGHTLY in-place apt refresh (kernel held, D47) and the WEEKLY
#   full rebuild from the base ISO — the cycle that rolls kernel CVEs. In-cluster
#   the rebuild hooks become `bun deploy/k8s-run-job.ts refresh|full`: the server
#   creates a privileged Job from a chart-rendered template on a Linux node,
#   waits for it, and surfaces the outcome in the console. The heavy privileged
#   work never runs in the server pod.
# ─────────────────────────────────────────────────────────────────────────────
imageUpdates:
  # Render the RBAC + Job templates and wire IMAGE_REBUILD_CMD /
  # IMAGE_FULL_REBUILD_CMD in the server's env.
  enabled: true
  # Architecture the in-cluster Jobs build for. Must match your boxes; the Jobs
  # get a kubernetes.io/arch nodeSelector so they land on a matching node.
  arch: arm64
  # How many builds the depot keeps PER ARCH (POL-45). The newest is served; any
  # retained build can be made active from Console ▸ Settings ▸ Onboard Screens,
  # which rolls the fleet back to it. Each retained build costs ~600MB of root
  # image on the depot volume — raise netboot.persistence.size if you raise this.
  retainBuilds: 3
  # Base ISO used ONLY to source the signed EFI System Partition for the
  # DOWNLOADABLE live ISO — the netboot image is built from ubuntu-base and needs
  # no ISO at all. Empty derives the official Ubuntu live-server URL from
  # ubuntuRelease + arch. Downloaded once onto the depot volume, cached under
  # cache/, and skipped entirely when no live ISO is being baked.
  baseIsoUrl: ""
  ubuntuRelease: "26.04"
  # Image the rebuild Jobs run in (needs apt; the scripts install their tools).
  jobImage: ubuntu:24.04
  # Finished Jobs are garbage-collected after this many seconds (kept for log
  # inspection until then; the hook already relayed the log tail to the console).
  ttlSecondsAfterFinished: 21600
  # Rebuilds are CPU-bound (mksquashfs zstd-19); give them room but cap them.
  jobResources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi
  # The plain-http control-plane address BAKED into the downloadable media the
  # rebuild Jobs publish (Console ▸ Settings ▸ Netboot): the boot medium
  # (BOOT_DIST_DIR/polyptic-boot.img) and the live ISO
  # (image/<arch>/polyptic-live.iso). Empty derives http://<ingressRoute.bootHost>
  # when the IngressRoute is enabled; with no address at all the Jobs skip the
  # media and only publish the netboot image. The live ISO additionally needs a
  # non-empty secrets.bootstrapToken (the ISO bakes the enrolment token).
  bakeBase: ""
  # Extra scheduling constraints for the rebuild Jobs (merged with the arch selector).
  nodeSelector: {}
  tolerations: []

secrets:
  # COOKIE_SECRET — signs the http-only session cookies. MUST be a long random
  # value in production. If left empty AND existingSecret is unset, the chart
  # generates a random 64-char secret on first install and preserves it across
  # upgrades (via lookup). Provide your own for GitOps/repeatable installs.
  cookieSecret: ""

  # POLYPTIC_BOOTSTRAP_TOKEN — shared agent-enrollment secret. UNSET ("") → OPEN
  # mode (every agent auto-approved; dev only). SET → gated enrollment + operator
  # approval. Set the SAME value on each agent.
  bootstrapToken: ""

  # Seed operator (created on first boot if no users exist). Set BOTH to bootstrap
  # the first admin login; leave empty to manage operators out-of-band.
  adminEmail: ""
  adminPassword: ""

  # Use a pre-existing Secret instead of letting the chart create one. When set,
  # the chart references keys from it: COOKIE_SECRET, POLYPTIC_BOOTSTRAP_TOKEN,
  # POLYPTIC_ADMIN_EMAIL, POLYPTIC_ADMIN_PASSWORD, DATABASE_URL.
  existingSecret: ""

# ─────────────────────────────────────────────────────────────────────────────
# Database wiring.
#   * postgresql.enabled=true  → deploy the Bitnami Postgres subchart; the chart
#     derives DATABASE_URL from these credentials automatically.
#   * postgresql.enabled=false → supply externalDatabase.url (or set
#     secrets.existingSecret with a DATABASE_URL key, or config-level env override).
# ─────────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: false
  auth:
    username: polyptic
    password: polyptic
    database: polyptic
    # Optional: use an existing secret for the Postgres password.
    existingSecret: ""
  # Bitnami chart sub-values pass through here (primary.persistence, etc.).
  primary:
    persistence:
      enabled: true
      size: 8Gi

externalDatabase:
  # Full Postgres connection string, used when postgresql.enabled=false.
  # e.g. postgres://user:pass@my-pg.rds.amazonaws.com:5432/polyptic
  url: ""
