# Default values for the Polyptic control-plane (server) chart.
# This file mirrors deploy/docker-compose.yml + deploy/server.Dockerfile +
# deploy/.env.example. Override on `helm install -f my-values.yaml` or `--set`.

# -- Number of server replicas. The control plane is currently a single-writer
# process (it holds the desired-state authority + in-memory WS hubs); keep this
# at 1 unless you have introduced sticky sessions / shared coordination.
replicaCount: 1

image:
  # Container image for the server, built from deploy/server.Dockerfile.
  repository: ghcr.io/polyptic/polyptic-server
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when empty.
  tag: ""

# Image pull secrets for private registries, e.g. [{ name: regcred }].
imagePullSecrets: []

# Override chart name / fullname in resource names.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # If true, create a ServiceAccount for the server pods.
  create: true
  # Annotations to add to the ServiceAccount (e.g. IRSA / Workload Identity).
  annotations: {}
  # Name to use; generated from the fullname template when empty.
  name: ""

# Extra annotations / labels applied to the Deployment's pod template.
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  # The Service port. The container always listens on containerPort (8080).
  port: 8080
  # Optional fixed nodePort when type=NodePort.
  nodePort: ""
  annotations: {}

# The port the server binds inside the container (server reads PORT). Keep 8080
# to match server.Dockerfile (EXPOSE 8080) and the Service default.
containerPort: 8080

# ── mTLS agent identity (POL-25, ON BY DEFAULT since POL-134) ─────────────────
# The agent channel carries the remote shell, DevTools, screenshots and window
# placement — so it is mutually authenticated OUT OF THE BOX, with nothing to
# configure. A second, TLS-terminating listener serves /agent: enrolment issues
# each machine a durable client certificate (signed by the deployment's own CA,
# persisted in the store) and a box without a valid cert is rejected in the TLS
# HANDSHAKE, before any app code. New boxes still enrol over the plain channel
# with their token (zero-click netboot survives): they receive a cert on that
# first hello and reconnect over mTLS by themselves; an upgraded fleet migrates
# the same way, box by box, narrated in the activity feed. Once every known
# machine has been seen on the mTLS listener the server promotes itself to
# REQUIRE mode (announced first in the feed): the plain channel then only enrols
# + issues certs, never carries a session. Console ▸ Settings ▸ Agent security
# shows the posture and each machine's cert state.
#
# The listener must reach the pod as raw TCP (never an HTTP(S) Ingress, which
# would terminate TLS and strip the client certificate). By default (POL-143) the
# chart publishes a dedicated NodePort Service for it and tells agents to dial
# that port — reachable on stock K3s with nothing to configure; see `expose`
# below. Requires a server image on Bun ≥ 1.3 (the boot self-test refuses to
# serve mTLS otherwise).
agentMtls:
  # The escape hatch for debugging: false renders AGENT_MTLS=off — the agent
  # channel then runs unauthenticated at the transport (app credentials still gate).
  enabled: true
  # Container + Service port for the TLS agent listener (AGENT_MTLS_PORT).
  port: 8443
  # The require posture. "" (default) = self-managing: the server auto-promotes
  # to require-mTLS once every known machine holds a working cert. true = pin
  # required NOW (AGENT_MTLS_REQUIRE=1). false = pin it off — never auto-promote
  # (AGENT_MTLS_REQUIRE=0), for fleets that must keep certless agents admitted.
  # Two cases where the false pin is exactly what you want:
  #   - dev/test tooling that dials the plain channel with fake agents: once a
  #     real fleet fully migrates and the posture promotes, those fake agents
  #     are answered-and-closed instead of admitted — pin false to keep them;
  #   - rolling boxes back to a pre-mTLS agent image AFTER promotion: rebooted
  #     (diskless) boxes come back certless and get no session until you pin
  #     false or fix the image. Promotion is one-way on purpose — once required,
  #     a failed mTLS listener at boot is FATAL rather than a silent fallback
  #     to plaintext sessions.
  require: ""
  # How the raw-TCP listener is PUBLISHED so wall boxes can reach it (POL-143).
  # This is the fix for "Certificate issued — moves over on next connection" that
  # never completes: on stock K3s the pod Service is ClusterIP (unreachable off
  # the cluster) and Traefik exposes only :80/:443, both HTTP — so an mTLS box
  # dialling <host>:8443 hits a door nobody opened. The options:
  #   nodePort (DEFAULT) — a dedicated NodePort Service publishes the listener on
  #     EVERY node at `nodePort`, and the chart advertises that port to agents
  #     (AGENT_MTLS_ADVERTISE_PORT): a box dials the same host it already knows on
  #     the NodePort, which forwards to the pod. Works out of the box on K3s.
  #   ingressRouteTCP (POL-147) — for clusters where the box can ONLY reach what
  #     Traefik routes (an arbitrary NodePort is firewalled off — the AMRC case).
  #     The chart renders a Traefik IngressRouteTCP with tls.passthrough on the
  #     websecure (:443) entrypoint, matched by a dedicated SNI host
  #     (mtls.<ingressRoute.host> by default). Traefik routes :443 by SNI: the
  #     console host terminates TLS normally, the mtls. SNI passes THROUGH
  #     untouched to the pod's :8443 so the client-cert handshake still runs
  #     (Traefik cannot terminate mutual TLS — it would strip the client cert).
  #     The chart advertises wss://<sniHost> (AGENT_MTLS_ADVERTISE_HOST) and adds
  #     that host to the listener's cert SANs. Needs the websecure entrypoint and
  #     the Traefik CRDs; no high port is opened. See ingressRouteTCP below.
  #   none — publish nothing extra; bring your own reachability (a LoadBalancer on
  #     `port`, or a Traefik IngressRouteTCP passthrough on an existing entrypoint)
  #     and point agents at it with `publicUrl`. See README ▸ mTLS exposure.
  expose: nodePort
  # The NodePort the mTLS listener is published on when expose=nodePort. Must sit
  # in the cluster's NodePort range (K3s default 30000–32767) and be the port a
  # box can reach the node on. Agents are told to dial THIS port.
  nodePort: 30843
  # POL-147 — the Traefik TLS-passthrough route, used only when expose=ingressRouteTCP.
  ingressRouteTCP:
    # The SNI host the passthrough route answers on, and the host boxes dial
    # (wss://<host>). Empty derives mtls.<ingressRoute.host> — one label under the
    # same wildcard, so an existing *.<domain> cert on the console host still
    # covers the console side of :443 while this SNI passes through. Requires
    # ingressRoute.host to be set (to derive) or an explicit host here.
    host: ""
    # The Traefik entrypoint the route binds. MUST be a :443 TLS entrypoint that
    # is actually exposed on the target Traefik (stock K3s: websecure). A box
    # dials :443, so a non-standard port needs publicUrl instead.
    entryPoint: websecure
  # Optional full wss:// URL agents should dial (AGENT_MTLS_PUBLIC_URL) when the
  # mTLS listener is exposed somewhere other than "same host, this port" — e.g. a
  # dedicated LoadBalancer or a bespoke IngressRouteTCP SNI host/port. Wins over
  # every expose mode. Empty = agents reuse the host they already dial (on the
  # NodePort for expose=nodePort, or the mtls. SNI host for ingressRouteTCP).
  publicUrl: ""
  # Extra SAN hostnames/IPs for the listener's server certificate — every name a
  # box might dial it by (joined into AGENT_MTLS_SANS).
  sans: []

ingress:
  enabled: false
  className: ""
  # Annotations pass through verbatim — this is where cert-manager wires in
  # (uncomment the issuer and cert-manager provisions `tls.secretName` itself).
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  host: polyptic.example.com
  # Path + pathType for the single host rule.
  path: /
  pathType: Prefix
  tls:
    # TLS is the DEFAULT (POL-70/D89): enabling the ingress emits a tls block for
    # `host` using `secretName` (pre-provisioned, or filled by cert-manager via
    # the annotation above). Opting OUT (enabled: false) serves the operator
    # console — passwords and sessions — over plain HTTP; the server keeps
    # working but drops the cookie Secure flag and warns loudly at boot.
    enabled: true
    secretName: polyptic-tls

# ─────────────────────────────────────────────────────────────────────────────
# Native server TLS (POL-70/D89) — the server itself terminates TLS on :8080.
# The PRIMARY path on Kubernetes is still a TLS-terminating ingress (above, or
# letsEncrypt below) in front of a plain listener; use this only when neither
# cert-manager nor a provisioned certificate exists — the homelab case.
# ─────────────────────────────────────────────────────────────────────────────
tls:
  # "" (default)   → plain HTTP in the pod; TLS (if any) terminates at the ingress.
  # "self-signed"  → the server mints + persists its own CA + certificate in the
  #                  store (server-side TLS_MODE=self-signed) and serves HTTPS
  #                  itself. Operators download the CA from Console ▸ Settings ▸
  #                  HTTPS and trust it once per device. The chart flips the
  #                  health probes to HTTPS (kubelet skips verification).
  #                  EXPOSURE: reach the pod directly (service.type NodePort /
  #                  LoadBalancer) — an HTTP ingress in front of an HTTPS pod
  #                  needs re-encryption config this chart deliberately doesn't
  #                  ship, and letsEncrypt/ingress TLS is the better answer there.
  #                  Set config.publicBaseUrl to the https:// address the console
  #                  is reached at. NOT combinable with letsEncrypt.enabled.
  mode: ""
  # Extra SANs for the self-signed certificate (every extra name/IP operators
  # dial). The chart already includes the derived public host and the in-cluster
  # Service DNS names; the server adds localhost + its own hostname.
  sans: []

# ─────────────────────────────────────────────────────────────────────────────
# Let's Encrypt (POL-70/D89) — free, auto-renewed REAL certificates for the
# ingress host, the zero-warning alternative to self-signed. Enabling this
# installs the vendored cert-manager subchart (condition-gated; skip it if the
# cluster already runs cert-manager and copy templates/lets-encrypt.yaml
# instead) and renders an ACME Issuer + a Certificate for the public host into
# the ingress's TLS secret — ingress TLS then Just Works with no manual secret.
# Requires: a public DNS name for the host and reachability on :80 for the
# http01 solver challenge.
# ─────────────────────────────────────────────────────────────────────────────
letsEncrypt:
  enabled: false
  # REQUIRED when enabled: the ACME account email (expiry notices land here).
  email: ""
  # Use the Let's Encrypt STAGING endpoint (untrusted certs, generous rate
  # limits) while testing the solver path; flip to false for the real cert.
  staging: false
  # Extra DNS names on the certificate beyond the derived public host.
  additionalDnsNames: []
  # Ingress class the http01 solver publishes its challenge on. K3s ships
  # Traefik, hence the default; nginx clusters set "nginx".
  solverIngressClass: traefik

# Values passed through to the vendored cert-manager subchart (only installed
# when letsEncrypt.enabled). CRDs must ship with it or the Issuer/Certificate
# above have no API to land on.
cert-manager:
  fullnameOverride: cert-manager
  crds:
    enabled: true

resources:
  limits:
    cpu: 1000m
    # 1Gi, not 512Mi (POL-73): the wired netboot chain buffers `initrd` per GRUB fetch for its
    # Content-Length, and that buffer grew to ~140 MB with POL-53's KMS drivers — two boxes cold
    # booting at once against a 512Mi limit is a coin toss. (The ~490 MB dongle and the root image
    # STREAM by contract and need no headroom here.)
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Liveness / readiness both hit the UNGATED top-level /healthz (NOT /api/v1).
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Prometheus scrape annotations for the UNGATED top-level /metrics endpoint.
# These are merged onto the pod template; a ServiceMonitor (Prometheus Operator)
# is out of scope but the annotations work with the standard kubernetes_sd scrape.
metrics:
  enabled: true
  path: /metrics
  port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Extra raw env vars appended verbatim to the container (list of {name,value} or
# valueFrom maps). Use for anything not surfaced as a first-class value below.
extraEnv: []

# Remote shell (POL-59) — an operator can open a terminal on an ARMED box from
# Console ▸ Machines. Arming is off by default per box and this bounds how long a
# forgotten armed box stays shell-openable: the server auto-disarms a box left
# armed-and-idle this many seconds (a box with a live session keeps extending).
# 0 disables the sweep, leaving arming sticky until a manual disarm.
remoteShell:
  armTtlSeconds: 3600

# Operator SSH (POL-81) — an admin can ARM SSH on a box from Console ▸ Machines: sshd starts, the
# operator's public key is installed for a dedicated debug user (passwordless sudo, key-auth only, no
# root login, root account locked). Off by default per box. This bounds how long a forgotten armed box
# stays SSH-open: the server auto-disarms it after this many seconds (the box also runs its OWN timer,
# so it closes even if the control plane is unreachable). 0 disables the SERVER sweep; the box-side TTL
# and default-closed-on-reboot still apply.
operatorSsh:
  armTtlSeconds: 3600

# ─────────────────────────────────────────────────────────────────────────────
# Application configuration (mirrors deploy/.env.example).
# Non-secret values land in a ConfigMap; secret values land in a Secret.
# ─────────────────────────────────────────────────────────────────────────────
config:
  # Registry backend: `postgres` (durable, default) or `memory` (ephemeral test double).
  store: postgres

  # ONE public origin (scheme://host[:port], no path) for the whole operator/wall
  # surface (POL-70/D89). When empty the chart DERIVES it from the enabled
  # ingress: https://<ingressRoute.host>, or http(s)://<ingress.host> per
  # ingress.tls.enabled. It becomes PUBLIC_BASE_URL and the default for the three
  # origin-shaped values below — set those only when they genuinely differ.
  # An https origin also flips session cookies Secure automatically.
  publicBaseUrl: ""

  # Comma-separated allowed CORS origins for the console/player (browsers send the
  # session cookie cross-origin, so this MUST list every browser origin). Empty
  # derives from publicBaseUrl / the ingress host — set it only for extra origins
  # (e.g. a separate dev console).
  corsOrigin: ""

  # Public ORIGIN the wall boxes open the player from. The chart appends the
  # /player path the single image serves the player app under, so do NOT add it
  # yourself. Empty derives from publicBaseUrl / the ingress host. Must be
  # reachable from the wall boxes.
  playerBaseUrl: ""

  # Fastify log level: trace|debug|info|warn|error|fatal.
  logLevel: info

  # NODE_ENV — "production" implies secure cookies when neither SECURE_COOKIES nor
  # an http(s) PUBLIC_BASE_URL decides first.
  nodeEnv: production

  # AUTH GATE (Phase 3f / D29). Leave true for any real deployment. The e2e suite
  # runs with this false; NEVER ship a public deployment with auth disabled.
  authEnabled: true

  # Mark session cookies `secure` (HTTPS-only). Leave "" (AUTO, the default): the
  # server derives it from the public origin — https → Secure on, declared-http →
  # Secure off (Secure cookies over plain HTTP are silently dropped by browsers,
  # so login would "succeed" and never persist — POL-43), else NODE_ENV. Set an
  # explicit true/false only to override that derivation.
  secureCookies: ""

  # Capture cadence for the live-preview thumbnails (server → agent server/capture
  # poll interval, milliseconds). Empty uses the server's built-in default.
  captureIntervalMs: ""

# ─────────────────────────────────────────────────────────────────────────────
# Media uploads (Phase 7).
#   Operators can UPLOAD images/videos (POST /api/v1/media, gated) on top of
#   LINKING external media URLs (Phase 3c). Uploads are streamed to a disk volume
#   (Polyptic does NOT use object storage) and served back, ungated, from the
#   top-level GET /media/:id with HTTP Range support (so video can seek). The
#   server reads MEDIA_DIR / MEDIA_PUBLIC_BASE / MEDIA_MAX_BYTES (configmap).
# ─────────────────────────────────────────────────────────────────────────────
media:
  # Directory the server writes uploads to. This is also the volumeMount path for
  # the media volume below — keep them identical.
  dir: /var/lib/polyptic/media

  # Absolute base URL prepended to /media/<id> when an upload becomes a
  # ContentSource.url. MUST be reachable by the players/public wall — in prod this
  # is normally your public HTTPS origin. Empty derives from config.publicBaseUrl /
  # the ingress host (POL-70/D89).
  publicBase: ""

  # Maximum accepted upload size, in bytes (streamed; rejected past this). ~200MB.
  # Quoted to keep Helm from coercing the large integer to scientific-notation float.
  maxBytes: "209715200"

  persistence:
    # When true, back MEDIA_DIR with a PersistentVolumeClaim so uploads survive
    # pod restarts/redeploys. When false, the pod uses an emptyDir (ephemeral —
    # uploads lost on restart; dev only).
    enabled: true
    # Use a pre-existing PVC instead of letting the chart create one. When set,
    # no PVC is rendered and the deployment mounts this claim directly.
    existingClaim: ""
    # PVC access mode(s). RWO suits the single-writer control plane; switch to
    # ReadWriteMany only if you scale the server and your storage supports it.
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    # StorageClass for the PVC. "" uses the cluster default; "-" disables dynamic
    # provisioning (bind to a pre-created PV).
    storageClass: ""

# ─────────────────────────────────────────────────────────────────────────────
# Traefik IngressRoute (the CRD), the recommended exposure on a Traefik cluster
# — an alternative to the generic `ingress:` above (enable one, not both).
#
# TWO hosts by design:
#   * `host` (HTTPS, websecure) — console + player + REST + the three WS
#     channels. These are deliberately ONE same-origin host: the operator
#     session is an http-only cookie, and splitting console/api onto different
#     subdomains would break it. WebSockets pass through Traefik natively.
#   * `bootHost` (PLAIN HTTP, web) — the boot depot only (/boot, /grub, /dist,
#     /install). GRUB speaks no TLS, so this router must stay http.
#     THIS hostname is what you bake into boot media and live ISOs:
#         POLYPTIC_BASE=http://boot.polyptic.example.com deploy/build-boot-medium.sh
#         POLYPTIC_BASE=http://boot.polyptic.example.com ... deploy/build-live-iso.sh arm64
#     A stable name here is the fix for "the server's IP changed and every
#     baked medium went stale."
# ─────────────────────────────────────────────────────────────────────────────
ingressRoute:
  enabled: false
  host: polyptic.example.com
  entryPoints:
    - websecure
  tls:
    # Traefik ACME resolver name (e.g. letsencrypt) — or set secretName instead.
    certResolver: ""
    # Pre-provisioned TLS secret for `host`.
    secretName: ""
  # The plain-HTTP boot-depot host. Empty disables the boot router.
  bootHost: boot.polyptic.example.com
  bootEntryPoints:
    - web

# ─────────────────────────────────────────────────────────────────────────────
# Fleet clock sync (POL-148) — a bundled NTP server + the client baked into the
# box image, WITHOUT the internet.
#
# A netboot wall box ships no time client of its own until POL-148, so it
# free-runs off its RTC: one fpd-ago box drifted an hour ahead and silently
# broke a Grafana dashboard (a relative `now-1m` range resolved from the box
# clock queried a FUTURE window → empty). The kiosk user is unprivileged
# (`set-time` → Access denied), so the fix is a baked-in system service on the
# box (systemd-timesyncd, in the live image) pointed at a time source it can
# actually reach on an air-gapped LAN.
#
# ON BY DEFAULT: the bundled server + its Traefik UDP route deploy out of the box.
# But NOTHING syncs until you add a Traefik `:123/udp` entrypoint yourself — the
# chart deliberately does NOT touch the cluster's shared Traefik. The README shows
# how (K3s HelmChartConfig + vanilla Traefik), and NOTES.txt says so on install.
#
# Two knobs decouple the CLIENT (always baked into the box image) from this SERVER:
#   * `clientHost` points the fleet at ANY NTP host (default: the boot host = this
#     bundled server). A site with its own NTP sets it and can set `enabled: false`.
#   * `upstream` chains this server to a real time source instead of serving the
#     node clock blind.
ntp:
  # Deploy the bundled chrony server + (by `expose`) its Traefik UDP route.
  # Set false to run NO server — pair with `clientHost: <your-ntp>` to point the
  # fleet at time infrastructure you already have.
  enabled: true

  # POL-148 — the NTP host the BOX IMAGE syncs to (stamped into the boot cmdline as
  # `polyptic.ntp=<host>`). Empty (default) derives the BOOT HOST, i.e. this bundled
  # server reached on UDP/123 via the Traefik route — zero config. Set it to a
  # site's own NTP (e.g. `ntp.corp.example` or a VIP) to use that instead; then you
  # can turn `enabled` off. The client is baked into the image regardless of the
  # server, so this is the "use my own NTP" escape hatch.
  clientHost: ""

  image:
    # Any image that provides /usr/sbin/chronyd works — the chart supplies the
    # config and overrides the entrypoint, so the image's own is not used.
    repository: cturra/ntp
    tag: latest
    pullPolicy: IfNotPresent
  # The stratum the local reference advertises (1–15; higher = less authoritative
  # but always beats a box's un-synced free-running clock). 8 is a sensible middle.
  # With `upstream` set this is the ORPHAN fallback stratum used only when the
  # upstream is unreachable.
  stratum: 8
  # OPTIONAL real time source(s) this server chains to (space/entry list of NTP
  # hosts or pools reachable from the pod). Empty (default) = a pure LOCAL stratum
  # reference: chronyd runs with `-x` (serve only, never touch the clock) and
  # serves the node's own clock — correct when the node's time is itself sound.
  # SET IT (e.g. [ntp.corp.example] or [pool.ntp.org]) when the node clock cannot
  # be trusted: chronyd then disciplines to the upstream and serves THAT (a real
  # stratum-2+), falling back to `local stratum` if the upstream drops. NOTE: with
  # an upstream, chronyd needs CAP_SYS_TIME and DOES adjust the node's clock (a
  # container shares the host kernel clock) — intended on a dedicated node, but a
  # reason to leave this empty on a node whose clock another agent already manages.
  upstream: []
  # Which clients chronyd answers. Behind a Traefik UDP route the source address
  # chronyd sees is Traefik's, not the box's, so restricting by the box network
  # here does not help — the ROUTE is the real boundary. Default: serve anyone who
  # reaches us. Set explicit CIDRs to also restrict at chronyd (e.g. [10.0.0.0/8]).
  allow:
    - all
  # How UDP/123 is PUBLISHED so wall boxes can reach it (mirrors agentMtls.expose):
  #   ingressRouteUDP (DEFAULT) — render a traefik.io/v1alpha1 IngressRouteUDP that
  #     routes a Traefik UDP entrypoint (ntp.ingressRouteUDP.entryPoint) to the
  #     chrony Service. A `:123/udp` entrypoint MUST exist on Traefik — the chart
  #     does NOT manage Traefik; add the entrypoint yourself (README shows how for
  #     K3s + vanilla Traefik). The route is inert (never an error) until it exists.
  #   none — publish nothing extra; bring your own reachability (a LoadBalancer /
  #     NodePort on the chrony Service's UDP port) and point boxes at it.
  expose: ingressRouteUDP
  ingressRouteUDP:
    # The Traefik UDP entrypoint this route binds. Must match a `:123/udp` entrypoint
    # you have added to Traefik (see README). The box dials the boot host on
    # :123/udp, which Traefik forwards to the chrony Service.
    entryPoint: ntp
  service:
    # The Service port (and containerPort) chronyd binds. NTP is 123 by convention;
    # the box uses the default 123, so keep this unless your route remaps it.
    port: 123
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─────────────────────────────────────────────────────────────────────────────
# Netboot depot (POL-33…41).
#   The server serves the live image (GET /dist/image/<arch>/…) and the signed
#   boot loaders (GET /dist/boot/<file>) from two directories; both live on one
#   depot volume so the rebuild Jobs and the server share the artifacts.
#   NOTE: GRUB speaks PLAIN HTTP (no TLS) — netbooting boxes must reach
#   the server over http:// (a LoadBalancer/NodePort on the management LAN), not
#   the HTTPS Ingress. Consoles/players keep HTTPS; only the boot path is
#   http-by-contract.
# ─────────────────────────────────────────────────────────────────────────────
netboot:
  # Mount path of the depot volume; IMAGE_DIST_DIR/BOOT_DIST_DIR derive from it
  # (<depotDir>/image and <depotDir>/boot).
  depotDir: /var/lib/polyptic/depot
  # Build the downloadable boot medium (polyptic-boot.img + its manifest + the
  # signed loaders) onto the depot via a per-revision Job, so the console's
  # bootloader download works as soon as there is an image to bake into it.
  # Needs an address to bake (imageUpdates.bakeBase or ingressRoute.bootHost)
  # and a persistent depot; without either the Job is skipped. POL-69: the Job
  # also bakes the CURRENT enrolment token (lifted from the server's
  # /boot/grub.cfg at build time) and the local Wi-Fi payload from the depot, so
  # the downloaded stick boots Wi-Fi-only screens on gated fleets — which makes
  # the .img a credential there, and a token rotation wants a `helm upgrade`
  # re-bake + re-flash of Wi-Fi sticks. POL-122: with no live image in the depot
  # (a fresh install) the Job publishes NOTHING and says why — it never falls
  # back to the LEAN wired-only medium, which is indistinguishable from the real
  # one once downloaded and boots no Wi-Fi screen. Build the first image and the
  # next `helm upgrade` (or the full rebuild itself) bakes the real medium.
  autoBuildMedium: true
  persistence:
    # Back the depot with a PVC. The live image is rebuilt nightly/weekly and
    # must survive pod restarts — without persistence every restart would need a
    # fresh full rebuild before boxes could netboot.
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    # Sized for build retention (POL-45). A live image is ~1.5–2GB, the weekly
    # full rebuild caches the ~3GB base ISO alongside it, and the depot keeps
    # `imageUpdates.retainBuilds` builds PER ARCH so an operator can roll back:
    #   3 builds x 2 arches x ~2GB  +  ~3GB base ISO  +  a build in flight
    # 30Gi covers the default. Shrink it if you retain fewer builds or one arch.
    size: 30Gi
    storageClass: ""

# ─────────────────────────────────────────────────────────────────────────────
# Automated image updates (POL-41/POL-43), Kubernetes-native.
#   The server keeps its two scheduled cycles (Console ▸ Settings ▸ Image
#   updates): the NIGHTLY in-place apt refresh (kernel held, D47) and the WEEKLY
#   full rebuild from the base ISO — the cycle that rolls kernel CVEs. In-cluster
#   the rebuild hooks become `bun deploy/k8s-run-job.ts refresh|full`: the server
#   creates a privileged Job from a chart-rendered template on a Linux node,
#   waits for it, and surfaces the outcome in the console. The heavy privileged
#   work never runs in the server pod.
# ─────────────────────────────────────────────────────────────────────────────
imageUpdates:
  # Render the RBAC + Job templates and wire IMAGE_REBUILD_CMD /
  # IMAGE_FULL_REBUILD_CMD in the server's env.
  enabled: true
  # Architecture(s) the in-cluster Jobs build for — one build Job per arch, and
  # the depot serves each at /dist/image/<arch>/ so a MIXED fleet (amd64 boxes +
  # arm64 boxes) is served from one cluster (POL-75). The boot chain already
  # picks each box's arch. `arches` is the canonical list; `arch` is the legacy
  # single value, used only when `arches` is empty.
  arches: []
  arch: arm64
  # Build a foreign architecture on this cluster's nodes via emulation (POL-75).
  # By default a build Job pins kubernetes.io/arch to its target, so it lands on
  # a NATIVE node — correct for a multi-arch cluster, but on a single-arch
  # cluster the foreign-arch Job can't schedule. Turn emulation on and: (a) an
  # optional privileged DaemonSet registers qemu (binfmt_misc, F-flag) on every
  # node, and (b) the build Jobs DROP the arch nodeSelector, so a foreign-arch
  # chroot runs emulated on whatever node holds the depot PVC. HONEST COST: the
  # foreign-arch build is SLOW (emulation), though confined to that one Job —
  # the native-arch build, serving, and everything else run at native speed.
  # Raise the deadlines + wait timeout below to fit an emulated build.
  emulation:
    enabled: false
    # Registers the qemu interpreters. Skip (installBinfmt: false) if your nodes
    # already have binfmt_misc handlers (F-flag) from the host or another tool.
    installBinfmt: true
    binfmtImage: tonistiigi/binfmt:latest
    # Tiny image that keeps the DaemonSet pod Running after the init registers.
    pauseImage: registry.k8s.io/pause:3.9
  # Job activeDeadlineSeconds. Defaults suit NATIVE builds (~6 min); an EMULATED
  # foreign-arch build needs far longer — raise these AND job.waitTimeoutSeconds
  # when emulation.enabled (e.g. 7200 / 14400).
  refreshDeadlineSeconds: 1800
  fullDeadlineSeconds: 2400
  # How long deploy/k8s-run-job.ts waits per arch before reporting a timeout
  # (bounded below the server's hook killer). Raise it for emulated builds.
  waitTimeoutSeconds: 2400
  # How many builds the depot keeps PER ARCH (POL-45). The newest is served; any
  # retained build can be made active from Console ▸ Settings ▸ Onboard Screens,
  # which rolls the fleet back to it. Each retained build costs ~600MB of root
  # image on the depot volume — raise netboot.persistence.size if you raise this.
  retainBuilds: 3
  # Base ISO used ONLY to source the signed EFI System Partition for the
  # DOWNLOADABLE live ISO — the netboot image is built from ubuntu-base and needs
  # no ISO at all. Empty derives the official Ubuntu live-server URL from
  # ubuntuRelease + arch. Downloaded once onto the depot volume, cached under
  # cache/, and skipped entirely when no live ISO is being baked.
  baseIsoUrl: ""
  ubuntuRelease: "26.04"
  # Image the rebuild Jobs run in (needs apt; the scripts install their tools).
  jobImage: ubuntu:24.04
  # Finished Jobs are garbage-collected after this many seconds (kept for log
  # inspection until then; the hook already relayed the log tail to the console).
  ttlSecondsAfterFinished: 21600
  # Rebuilds are CPU-bound (mksquashfs zstd-19); give them room but cap them.
  jobResources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi
  # The plain-http control-plane address BAKED into the downloadable media the
  # rebuild Jobs publish (Console ▸ Settings ▸ Netboot): the boot medium
  # (BOOT_DIST_DIR/polyptic-boot.img) and the live ISO
  # (image/<arch>/polyptic-live.iso). Empty derives http://<ingressRoute.bootHost>
  # when the IngressRoute is enabled; with no address at all the Jobs skip the
  # media and only publish the netboot image. The live ISO additionally needs a
  # non-empty secrets.bootstrapToken (the ISO bakes the enrolment token).
  bakeBase: ""
  # Extra scheduling constraints for the rebuild Jobs (merged with the arch selector).
  nodeSelector: {}
  tolerations: []

secrets:
  # COOKIE_SECRET — signs the http-only session cookies. MUST be a long random
  # value in production. If left empty AND existingSecret is unset, the chart
  # generates a random 64-char secret on first install and preserves it across
  # upgrades (via lookup). Provide your own for GitOps/repeatable installs.
  cookieSecret: ""

  # POLYPTIC_BOOTSTRAP_TOKEN — shared agent-enrollment secret. UNSET ("") → OPEN
  # mode (every agent auto-approved; dev only). SET → gated enrollment + operator
  # approval. Set the SAME value on each agent.
  bootstrapToken: ""

  # Seed operator (created on first boot if no users exist). Set BOTH to bootstrap
  # the first admin login; leave empty to manage operators out-of-band.
  adminEmail: ""
  adminPassword: ""

  # Use a pre-existing Secret instead of letting the chart create one. When set,
  # the chart references keys from it: COOKIE_SECRET, POLYPTIC_BOOTSTRAP_TOKEN,
  # POLYPTIC_ADMIN_EMAIL, POLYPTIC_ADMIN_PASSWORD, DATABASE_URL.
  existingSecret: ""

# ─────────────────────────────────────────────────────────────────────────────
# Database wiring (POL-123/D108) — BATTERIES INCLUDED.
#
#   * postgresql.enabled=true (the DEFAULT) → the chart deploys Postgres itself:
#     a first-party StatefulSet + Service (templates/postgres.yaml), no subchart,
#     no vendored tarball. DATABASE_URL is wired automatically; the operator sets
#     nothing. `helm install polyptic …` is the whole deployment.
#   * postgresql.enabled=false → bring your own: externalDatabase.url, or
#     secrets.existingSecret carrying a DATABASE_URL key.
#
# These two are MUTUALLY EXCLUSIVE and the chart refuses to render both (and
# refuses config.store=postgres with neither — that combination used to install
# happily and crash-loop on `getaddrinfo ENOTFOUND`).
# ─────────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

  image:
    repository: postgres
    # Track a MAJOR line, not `latest` — a major bump needs pg_upgrade, not a pod roll.
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    username: polyptic
    database: polyptic
    # Password for the bundled database. Empty (the default) → the chart generates
    # a random 32-char password on first install and PRESERVES it across upgrades
    # (same lookup pattern as secrets.cookieSecret). There is deliberately no
    # literal default: a chart that ships `password: polyptic` ships it to every
    # install that forgets to override. Keep any explicit password URL-safe
    # (alphanumeric) — it goes into a postgres:// connection string.
    password: ""
    # Bring your own Secret for the password instead (GitOps). It must exist
    # before install and hold the key below; the chart never reads its contents.
    existingSecret: ""
    existingSecretPasswordKey: POSTGRES_PASSWORD

  service:
    port: 5432

  persistence:
    # Back the data directory with a PersistentVolumeClaim. FALSE means the
    # registry is wiped on every pod restart — dev only.
    enabled: true
    # ADOPTION (POL-123): point at a PVC you already have — e.g. the `polyptic-db`
    # claim from the hand-rolled companion manifest this chart replaces — and the
    # StatefulSet mounts it instead of creating its own. Your data comes with you.
    # When empty, the StatefulSet's volumeClaimTemplate creates (and keeps, even
    # across `helm uninstall`) a claim named data-<release>-db-0.
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    # "" uses the cluster default StorageClass; "-" disables dynamic provisioning.
    storageClass: ""

  # Modest by default: the control plane's registry is a small OLTP database
  # (screens, murals, scenes, content), not a warehouse.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # The postgres image's entrypoint starts as root and drops to the `postgres`
  # user itself (it must chown PGDATA first), so no runAsNonRoot here — unlike
  # the server pod, which never needs root.
  podSecurityContext: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

externalDatabase:
  # Full Postgres connection string for YOUR database. Requires
  # postgresql.enabled=false — setting both is refused at template time.
  # e.g. postgres://user:pass@my-pg.rds.amazonaws.com:5432/polyptic
  url: ""
