{{- /*
Boot-medium Job (POL-35): build the downloadable boot medium (polyptic-boot.img +
the four signed loaders) onto the depot PVC at install/upgrade time, so the
console's "Download bootloader" button works from minute one instead of waiting
for the first weekly full rebuild (which also builds it, and keeps doing so).

Renders only when BOTH hold:
  - the chart knows the plain-http address to BAKE into the stick's stage-1
    grub.cfg (imageUpdates.bakeBase, else derived from ingressRoute.bootHost) —
    with no address there is nothing safe to bake, and silently baking a
    LoadBalancer IP is exactly the stale-address trap NETBOOT.md warns about;
  - the depot is persistent (with an emptyDir depot the Job's output would land
    on a volume no other pod can even see).

The build is UNPRIVILEGED (curl + ar/tar/zstd + mtools, no root requirement
beyond the container default): it downloads the four pinned signed loader
debs, verifies their sha256 pins, and assembles one FAT32 image. A re-run is
deterministic, so an upgrade simply re-bakes — which is what you want when
bootHost changes. The scripts come from an initContainer running the SERVER
image (version-locked, no chart-side copies), the same pattern as the rebuild
Jobs. Pod affinity to the server pins the Job to the node holding the
ReadWriteOnce depot PVC.

Deliberately NOT a helm hook. The first release shipped this as
post-install/post-upgrade, and helm then BLOCKS the upgrade waiting for the
hook: on a slow apt mirror the Job outlived helm's 5-minute default and the
operator's upgrade reported "post-upgrade hooks failed: timed out" even
though both the upgrade and (eventually) the Job succeeded (fpd-ago,
2026-07-10). A plain Job named per release revision gets a fresh run on every
install/upgrade without helm ever waiting on it; ttlSecondsAfterFinished
garbage-collects the old ones.

The Job chowns its output to the server's runtime uid (1000, `bun` in the
server image): it writes as root, and a root-owned depot is what stopped the
server from creating builds/ for retention (EACCES, same incident).

POL-69: the medium's LOCAL Wi-Fi payload (POL-63/D67) needs two more inputs.
  - The ENROLMENT TOKEN, baked into the local menu — a Wi-Fi boot can never
    fetch the server's tokenized menu, so gated fleets need it on the stick.
    It is lifted at build time from the server's own ungated /boot/grub.cfg
    (via the in-cluster service, not the ingress), the exact place wired boxes
    get it: always the CURRENT token, even after a console rotation, with no
    secret plumbed through chart values to go stale. Rotating the token means
    re-baking (helm upgrade / re-run the Job) and re-downloading Wi-Fi sticks;
    wired sticks never carried it and still don't. The downloadable .img is
    therefore a CREDENTIAL on gated fleets — same trust model as the live ISO.
  - The PAYLOAD (kernel + initrd-wifi), read straight off the depot PVC
    (IMAGE_DIR_BASE=/depot/image) rather than fetched over the bake address,
    which may not resolve from inside the cluster. On a FRESH install the
    depot has no image yet and the v2 build refuses to assemble a payload-less
    medium — so the Job detects that and falls back to LEAN=1 (the old tiny
    wired-only dongle, loudly), keeping "Download bootloader works from
    minute one" true; the next full rebuild + helm upgrade (or a manual
    re-run) re-bakes it with the payload.

Opt out with netboot.autoBuildMedium=false (the weekly full rebuild still
builds the medium as before).
*/ -}}
{{- $bakeBase := .Values.imageUpdates.bakeBase }}
{{- if and (not $bakeBase) .Values.ingressRoute.enabled .Values.ingressRoute.bootHost }}
{{- $bakeBase = printf "http://%s" .Values.ingressRoute.bootHost }}
{{- end }}
{{- if and .Values.netboot.autoBuildMedium .Values.netboot.persistence.enabled $bakeBase }}
apiVersion: batch/v1
kind: Job
metadata:
  # Revision-suffixed: each helm install/upgrade creates a NEW Job (Job specs are immutable, and a
  # fixed name would make the second upgrade a no-op). Old revisions are TTL-reaped.
  name: {{ include "polyptic.fullname" . }}-boot-medium-r{{ .Release.Revision }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
    app.kubernetes.io/component: boot-medium
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: {{ int .Values.imageUpdates.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: polyptic
        app.kubernetes.io/component: boot-medium
    spec:
      restartPolicy: Never
      # The depot PVC is ReadWriteOnce by default: land on the node already
      # holding it (the server's node), same constraint as the rebuild Jobs.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ include "polyptic.name" . }}
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: payload
          image: {{ include "polyptic.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # build-boot-medium.sh resolves committed assets (the offline splash theme, POL-82/88) at
          # $REPO_ROOT/packages/server/assets — copy them alongside deploy/ or the bake goes plain.
          command: ["sh", "-c", "mkdir -p /repo/deploy /repo/packages/server/assets && cp -a /app/deploy/. /repo/deploy/ && cp -a /app/packages/server/assets/. /repo/packages/server/assets/"]
          volumeMounts:
            - name: repo
              mountPath: /repo
      containers:
        - name: build
          image: {{ .Values.imageUpdates.jobImage }}
          command:
            - bash
            - -c
            - >-
              set -eu;
              export DEBIAN_FRONTEND=noninteractive;
              apt-get update -qq;
              apt-get install -y -qq curl ca-certificates mtools binutils xz-utils zstd >/dev/null;
              svc="http://{{ include "polyptic.fullname" . }}:{{ .Values.service.port }}";
              menu="";
              for i in $(seq 1 30); do
                menu="$(curl -fsS --max-time 5 "$svc/boot/grub.cfg" 2>/dev/null)" && break;
                echo "waiting for the control plane at $svc ($i/30) ...";
                sleep 2;
              done;
              token="$(printf '%s' "$menu" | sed -n 's/.*polyptic\.token=\([^ ]*\).*/\1/p' | head -n1)";
              if [ -z "$menu" ]; then echo "WARNING: control plane unreachable - building without a token (gated fleets: re-run this Job once the server is up)"; fi;
              lean="";
              if ! ls /depot/image/*/initrd-wifi >/dev/null 2>&1; then
                lean=1;
                echo "no live image with a Wi-Fi payload in the depot yet - building the LEAN wired-only medium (run a Full rebuild, then helm upgrade or re-run this Job to re-bake with the Wi-Fi payload)";
              fi;
              POLYPTIC_BASE={{ $bakeBase | quote }} POLYPTIC_TOKEN="$token" LEAN="$lean"
              IMAGE_DIR_BASE=/depot/image bash /repo/deploy/build-boot-medium.sh;
              mkdir -p /depot/boot;
              cp -f /repo/deploy/dist/boot/* /depot/boot/;
              chown -R 1000:1000 /depot/boot;
              echo "boot medium published to /depot/boot"
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: depot
              mountPath: /depot
      volumes:
        - name: repo
          emptyDir: {}
        - name: depot
          persistentVolumeClaim:
            claimName: {{ include "polyptic.depot.pvcName" . }}
{{- end }}
