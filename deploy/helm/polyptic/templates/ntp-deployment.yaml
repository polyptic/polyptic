{{- /*
POL-148 — the bundled NTP server: a single chronyd, configured as a LOCAL stratum reference (no
internet upstream) so an air-gapped wall fleet has a time source to discipline its clocks to.

The image's own entrypoint is BYPASSED (`command: [chronyd]`) so any image carrying /usr/sbin/chronyd
works — the chart owns the config via the mounted ConfigMap. `-d` keeps it in the foreground logging
to stderr for the kubelet, `-f` points it at our conf. chronyd runs as root (the image's default user)
under a restricted capability set — drop ALL, add only NET_BIND_SERVICE — so it can bind UDP/123 but
holds no CAP_CHOWN. Because the entrypoint is skipped, /run/chrony is never created, and without
CAP_CHOWN chronyd could not set it up itself; so the conf pins `user root` (no privilege drop, no
runtime-dir chown) and relocates the pidfile + command socket into the mounted state volume (POL-151).

With NO `ntp.upstream` (default) it serves the node clock: `-x` (never touch the clock) + only
CAP_NET_BIND_SERVICE. With an upstream it must DISCIPLINE its own clock to that source, so `-x` is
dropped and CAP_SYS_TIME is added (a container shares the host kernel clock — see values.yaml).
*/ -}}
{{- if .Values.ntp.enabled }}
{{- $name := printf "%s-ntp" (include "polyptic.fullname" .) }}
{{- $upstream := .Values.ntp.upstream }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntp
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "polyptic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ntp
  template:
    metadata:
      labels:
        {{- include "polyptic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ntp
      annotations:
        # Roll the pod when the served config changes, so a stratum/allow edit takes effect on upgrade.
        checksum/config: {{ include (print $.Template.BasePath "/ntp-configmap.yaml") . | sha256sum }}
        {{- with .Values.ntp.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chronyd
          image: {{ printf "%s:%s" .Values.ntp.image.repository (.Values.ntp.image.tag | toString) | quote }}
          imagePullPolicy: {{ .Values.ntp.image.pullPolicy }}
          command: ["chronyd"]
          {{- if $upstream }}
          # An upstream is set: chronyd disciplines its own clock to it (no -x).
          args: ["-d", "-f", "/etc/chrony/chrony.conf"]
          {{- else }}
          # No upstream: serve the node clock, never step it (-x).
          args: ["-d", "-x", "-f", "/etc/chrony/chrony.conf"]
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                # Bind the privileged UDP/123.
                - NET_BIND_SERVICE
                {{- if $upstream }}
                # With an upstream, chronyd steps/slews the clock to it — needs SYS_TIME.
                - SYS_TIME
                {{- end }}
          ports:
            - name: ntp
              containerPort: {{ .Values.ntp.service.port | int }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/chrony
              readOnly: true
            - name: state
              mountPath: /var/lib/chrony
          {{- with .Values.ntp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
        - name: state
          emptyDir: {}
      {{- with .Values.ntp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ntp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ntp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
