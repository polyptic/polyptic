{{- /*
POL-148 — the bundled NTP server: a single chronyd, configured as a LOCAL stratum reference (no
internet upstream) so an air-gapped wall fleet has a time source to discipline its clocks to.

The image's own entrypoint is BYPASSED (`command: [chronyd]`) so any image carrying /usr/sbin/chronyd
works — the chart owns the config via the mounted ConfigMap. `-x` disciplines nothing locally (it
only serves), `-d` keeps it in the foreground logging to stderr for the kubelet, `-f` points it at
our conf. chronyd starts as root to bind UDP/123 and drops to its own user itself.
*/ -}}
{{- if .Values.ntp.enabled }}
{{- $name := printf "%s-ntp" (include "polyptic.fullname" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntp
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "polyptic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ntp
  template:
    metadata:
      labels:
        {{- include "polyptic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ntp
      annotations:
        # Roll the pod when the served config changes, so a stratum/allow edit takes effect on upgrade.
        checksum/config: {{ include (print $.Template.BasePath "/ntp-configmap.yaml") . | sha256sum }}
        {{- with .Values.ntp.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chronyd
          image: {{ printf "%s:%s" .Values.ntp.image.repository (.Values.ntp.image.tag | toString) | quote }}
          imagePullPolicy: {{ .Values.ntp.image.pullPolicy }}
          command: ["chronyd"]
          args: ["-d", "-x", "-f", "/etc/chrony/chrony.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                # Bind the privileged UDP/123. SYS_TIME is deliberately NOT here: `-x` means chronyd
                # never sets the clock, so it needs no time-setting capability.
                - NET_BIND_SERVICE
          ports:
            - name: ntp
              containerPort: {{ .Values.ntp.service.port | int }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/chrony
              readOnly: true
            - name: state
              mountPath: /var/lib/chrony
          {{- with .Values.ntp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
        - name: state
          emptyDir: {}
      {{- with .Values.ntp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ntp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ntp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
