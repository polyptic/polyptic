apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polyptic.fullname" . }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "polyptic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the non-secret config or the rebuild Job templates change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.imageUpdates.enabled }}
        checksum/rebuild-jobs: {{ include (print $.Template.BasePath "/rebuild-jobs.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polyptic.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "polyptic.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "polyptic.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
            {{- if .Values.agentMtls.enabled }}
            # POL-25: the dedicated TLS agent listener (client-cert mTLS).
            - name: agent-mtls
              containerPort: {{ .Values.agentMtls.port }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "polyptic.configMapName" . }}
          env:
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: COOKIE_SECRET
            - name: POLYPTIC_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: POLYPTIC_BOOTSTRAP_TOKEN
                  optional: true
            - name: POLYPTIC_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: POLYPTIC_ADMIN_EMAIL
                  optional: true
            - name: POLYPTIC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: POLYPTIC_ADMIN_PASSWORD
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: DATABASE_URL
                  # Optional so STORE=memory (no DB) does not block startup.
                  optional: true
            {{- if .Values.oidc.enabled }}
            # POL-106 — the OIDC client secret (the rest of the OIDC config is in the ConfigMap).
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "polyptic.secretName" . }}
                  key: OIDC_CLIENT_SECRET
            {{- end }}
            {{- if .Values.remoteShell.armTtlSeconds }}
            # POL-59 — auto-disarm a remote shell left armed-and-idle this long. 0 disables (sticky).
            - name: SHELL_ARM_TTL_MS
              value: {{ mul (int .Values.remoteShell.armTtlSeconds) 1000 | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            # Phase 7: uploaded media lives on a disk volume mounted at MEDIA_DIR.
            - name: media
              mountPath: {{ .Values.media.dir | quote }}
            # Netboot depot (POL-33…41): the live image + loaders the server
            # serves and the rebuild Jobs write. Shared with the Jobs via PVC.
            - name: depot
              mountPath: {{ .Values.netboot.depotDir | quote }}
            {{- if .Values.imageUpdates.enabled }}
            # The rebuild Job templates for the k8s hook (deploy/k8s-run-job.ts).
            - name: rebuild-jobs
              mountPath: /etc/polyptic/jobs
              readOnly: true
            {{- end }}
          {{- /* Native self-signed TLS (POL-70/D89): the pod serves HTTPS on the same port, so
               httpGet probes must say scheme HTTPS (kubelet skips certificate verification, so the
               self-signed cert is fine). Untouched otherwise — default renders stay byte-identical. */}}
          {{- $selfSigned := eq .Values.tls.mode "self-signed" }}
          {{- with .Values.livenessProbe }}
          {{- $probe := deepCopy . }}
          {{- if and $selfSigned $probe.httpGet }}{{- $_ := set $probe.httpGet "scheme" "HTTPS" }}{{- end }}
          livenessProbe:
            {{- toYaml $probe | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          {{- $probe := deepCopy . }}
          {{- if and $selfSigned $probe.httpGet }}{{- $_ := set $probe.httpGet "scheme" "HTTPS" }}{{- end }}
          readinessProbe:
            {{- toYaml $probe | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        # Phase 7 media store. When persistence is enabled, back MEDIA_DIR with a
        # PVC (durable across pod restarts/redeploys); otherwise an emptyDir
        # (ephemeral — uploads lost on restart; dev only).
        - name: media
          {{- if .Values.media.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "polyptic.media.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        # Netboot depot (POL-33…41). Persistent by default — losing it means no
        # box can netboot until a full rebuild finishes.
        - name: depot
          {{- if .Values.netboot.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "polyptic.depot.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.imageUpdates.enabled }}
        - name: rebuild-jobs
          configMap:
            name: {{ include "polyptic.fullname" . }}-rebuild-jobs
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
