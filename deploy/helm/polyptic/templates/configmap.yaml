apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "polyptic.configMapName" . }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
data:
  # Non-secret server configuration (mirrors deploy/.env.example).
  PORT: {{ .Values.containerPort | quote }}
  HOST: "0.0.0.0"
  STORE: {{ .Values.config.store | quote }}
  {{- $publicBase := include "polyptic.publicBaseUrl" . }}
  {{- if $publicBase }}
  # The ONE public origin (POL-70/D89): explicit config.publicBaseUrl, or derived from the enabled
  # ingress. The server keys cookie security off its scheme (https → Secure) and uses it as the
  # last-resort base for request-derived URLs.
  PUBLIC_BASE_URL: {{ $publicBase | quote }}
  {{- end }}
  CORS_ORIGIN: {{ include "polyptic.corsOrigin" . | quote }}
  {{- if eq .Values.tls.mode "self-signed" }}
  # ── Native self-signed TLS (POL-70/D89): the server mints + persists its own CA/cert and serves
  # HTTPS itself. SANs cover the derived public host, the in-cluster Service DNS names, and any
  # extra tls.sans; the server adds localhost + its own hostname. Probes flip to HTTPS (deployment).
  TLS_MODE: "self-signed"
  TLS_SANS: {{ include "polyptic.tlsSans" . | quote }}
  {{- end }}
  # The player lives under /player/ in the single image — the helper appends it (see _helpers.tpl).
  PLAYER_BASE_URL: {{ include "polyptic.playerBaseUrl" . | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  AUTH_ENABLED: {{ .Values.config.authEnabled | quote }}
  {{- if ne (toString .Values.config.secureCookies) "" }}
  # Explicit override — "" (auto, the default) lets the server derive Secure from
  # PUBLIC_BASE_URL's scheme, falling back to NODE_ENV (POL-70/D89).
  SECURE_COOKIES: {{ .Values.config.secureCookies | quote }}
  {{- end }}
  {{- if ne (toString .Values.config.captureIntervalMs) "" }}
  CAPTURE_INTERVAL_MS: {{ .Values.config.captureIntervalMs | quote }}
  {{- end }}
  {{- if .Values.agentMtls.enabled }}
  # ── mTLS agent identity (POL-25, default-on since POL-134) ──────────────────
  # The dedicated TLS agent listener. Reaches the pod as raw TCP (see values.yaml:
  # an HTTP(S) Ingress would terminate TLS and strip the client certificate).
  AGENT_MTLS_PORT: {{ .Values.agentMtls.port | quote }}
  {{- if ne (toString .Values.agentMtls.require) "" }}
  # Pinned require posture — "" (the default) omits this and lets the server
  # auto-promote to require-mTLS once every known machine holds a working cert.
  AGENT_MTLS_REQUIRE: {{ ternary "1" "0" (eq (toString .Values.agentMtls.require) "true") | quote }}
  {{- end }}
  {{- if .Values.agentMtls.publicUrl }}
  # Full wss:// override — the operator pointed agents at a specific endpoint
  # (a dedicated LoadBalancer, an IngressRouteTCP SNI host, …). Beats every guess.
  AGENT_MTLS_PUBLIC_URL: {{ .Values.agentMtls.publicUrl | quote }}
  {{- else if eq .Values.agentMtls.expose "nodePort" }}
  # POL-143 — boxes reach the listener through the NodePort, NOT the pod's bind
  # port. Advertise the port they must actually DIAL (same host they already know,
  # this port), or a stock-K3s fleet dials :8443 on the LB — which routes nothing —
  # and sits on "moves over on next connection" forever. The server sends this in
  # the cert bundle; the agent dials it instead of guessing.
  AGENT_MTLS_ADVERTISE_PORT: {{ .Values.agentMtls.nodePort | quote }}
  {{- end }}
  {{- if .Values.agentMtls.sans }}
  AGENT_MTLS_SANS: {{ join "," .Values.agentMtls.sans | quote }}
  {{- end }}
  {{- else }}
  # agentMtls.enabled=false — the explicit escape hatch. Without this the server
  # would still bring the listener up by itself (POL-134 default-on).
  AGENT_MTLS: "off"
  {{- end }}
  # ── Phase 7 — MEDIA ─────────────────────────────────────────────────────────
  # Uploads (POST /api/v1/media) are streamed to MEDIA_DIR (a mounted volume, see
  # the PVC/volumeMount in deployment.yaml) and served back, ungated, from the
  # top-level GET /media/:id so players on other hosts can fetch them.
  MEDIA_DIR: {{ .Values.media.dir | quote }}
  MEDIA_PUBLIC_BASE: {{ include "polyptic.mediaPublicBase" . | quote }}
  MEDIA_MAX_BYTES: {{ .Values.media.maxBytes | quote }}
  # ── Netboot depot (POL-33…41) ───────────────────────────────────────────────
  # The live image + signed loaders, served ungated from the depot volume
  # (GET /dist/image/<arch>/… and GET /dist/boot/<file>). Plain HTTP by contract.
  IMAGE_DIST_DIR: {{ include "polyptic.imageDistDir" . | quote }}
  BOOT_DIST_DIR: {{ include "polyptic.bootDistDir" . | quote }}
  {{- if .Values.imageUpdates.enabled }}
  # ── Image updates (POL-41/POL-43) ───────────────────────────────────────────
  # The two rebuild hooks: in-cluster they create a privileged Job from the
  # chart-rendered templates (see rebuild-jobs.yaml) and wait — the server pod
  # itself never chroots or mounts anything.
  # No arch arg → k8s-run-job.ts fans out over every arch the chart rendered (POL-75).
  IMAGE_REBUILD_CMD: "bun deploy/k8s-run-job.ts refresh"
  IMAGE_FULL_REBUILD_CMD: "bun deploy/k8s-run-job.ts full"
  POLYPTIC_JOB_TEMPLATE_DIR: "/etc/polyptic/jobs"
  # The hook killer (server side) and the per-arch Job wait (k8s-run-job.ts). Both scale up for
  # emulated cross-arch builds, which run one slow Job per arch, sequentially (POL-75).
  POLYPTIC_HOOK_TIMEOUT_MS: {{ mul (int .Values.imageUpdates.waitTimeoutSeconds) (len (default (list .Values.imageUpdates.arch) .Values.imageUpdates.arches)) 1000 | quote }}
  POLYPTIC_JOB_WAIT_TIMEOUT_MS: {{ mul (int .Values.imageUpdates.waitTimeoutSeconds) 1000 | quote }}
  # Builds retained per arch in the depot (POL-45). Any of them can be made the
  # ACTIVE image from the console, which is how a fleet rolls back. Each costs
  # ~2GB on the depot PVC — size netboot.persistence.size to match.
  IMAGE_RETAIN_BUILDS: {{ .Values.imageUpdates.retainBuilds | quote }}
  {{- end }}
