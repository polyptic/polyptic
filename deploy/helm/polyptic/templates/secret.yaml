{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "polyptic.secretName" . }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
  annotations:
    # Preserve a generated COOKIE_SECRET across `helm upgrade` (the helper looks up
    # the existing value); keep the resource on uninstall only if you opt in below.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Signs the http-only session cookies. Generated + preserved when unset.
  COOKIE_SECRET: {{ include "polyptic.cookieSecret" . | quote }}
  # Agent enrollment token: empty string => OPEN enrollment (dev only).
  POLYPTIC_BOOTSTRAP_TOKEN: {{ .Values.secrets.bootstrapToken | quote }}
  # Seed operator (created on first boot when no users exist).
  POLYPTIC_ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  POLYPTIC_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- if .Values.oidc.enabled }}
  # OIDC client secret (POL-106) — the one OIDC value that is a credential.
  OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
  {{- $dbUrl := include "polyptic.databaseUrl" . }}
  {{- if $dbUrl }}
  # Resolved from the Postgres subchart or externalDatabase.url.
  DATABASE_URL: {{ $dbUrl | quote }}
  {{- end }}
{{- end }}
