{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "polyptic.secretName" . }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
  annotations:
    # Preserve a generated COOKIE_SECRET across `helm upgrade` (the helper looks up
    # the existing value); keep the resource on uninstall only if you opt in below.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Signs the http-only session cookies. Generated + preserved when unset.
  COOKIE_SECRET: {{ include "polyptic.cookieSecret" . | quote }}
  # Agent enrollment token: empty string => OPEN enrollment (dev only).
  POLYPTIC_BOOTSTRAP_TOKEN: {{ .Values.secrets.bootstrapToken | quote }}
  # Seed operator (created on first boot when no users exist).
  POLYPTIC_ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  POLYPTIC_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- $dbUrl := include "polyptic.databaseUrl" . }}
  {{- if $dbUrl }}
  # An EXTERNAL Postgres (externalDatabase.url). The bundled database does not appear here: its
  # password is injected into the server pod as POSTGRES_PASSWORD and expanded into DATABASE_URL by
  # the kubelet, so no plaintext connection string is rendered (POL-123/D108).
  DATABASE_URL: {{ $dbUrl | quote }}
  {{- end }}
  {{- if and (include "polyptic.postgresql.deployed" .) (not .Values.postgresql.auth.existingSecret) }}
  # Bundled Postgres password: explicit postgresql.auth.password, else the value already stored
  # here (preserved across `helm upgrade` — rotating it would lock the chart out of its own
  # database), else generated. There is no weak literal default (POL-123/D108).
  POSTGRES_PASSWORD: {{ include "polyptic.postgresqlPassword" . | quote }}
  {{- end }}
{{- end }}
