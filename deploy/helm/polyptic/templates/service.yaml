apiVersion: v1
kind: Service
metadata:
  name: {{ include "polyptic.fullname" . }}
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") (ne (toString .Values.service.nodePort) "") }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.agentMtls.enabled }}
    # POL-25: the mTLS agent channel — raw TCP end to end (never behind an HTTP Ingress,
    # which would terminate TLS itself and strip the agent's client certificate).
    - name: agent-mtls
      port: {{ .Values.agentMtls.port }}
      targetPort: agent-mtls
      protocol: TCP
    {{- end }}
  selector:
    {{- include "polyptic.selectorLabels" . | nindent 4 }}
