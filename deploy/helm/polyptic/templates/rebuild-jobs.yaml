{{- /*
The two rebuild Job templates (POL-41/POL-43), rendered as JSON for the server's
k8s hook (`bun deploy/k8s-run-job.ts refresh|full`, see deploy/k8s-run-job.ts):
the server POSTs one of these to the API when its schedule fires or the operator
clicks Refresh/Full-rebuild-now, then waits and relays the logs.

  refresh.json — nightly in-place apt refresh of the existing image (kernel
                 held, D47; exits untouched when apt has nothing to upgrade).
  full.json    — weekly rebuild from the base ISO: the cycle that rolls KERNEL
                 CVEs. Downloads + caches the base ISO on the depot volume.

Both run PRIVILEGED (chroot + loop mounts) in a plain ubuntu container on a
Linux node of imageUpdates.arch. The scripts come from an initContainer running
the SERVER image (version-locked, no chart-side copies); artifacts land on the
shared depot PVC the server serves from. Scratch space (an unsquashed rootfs is
several GB) is an emptyDir at /var/tmp.
*/ -}}
{{- define "polyptic.rebuildJob" -}}
{{- /* args: root ctx, payload/volumes/mounts/nodeSelector dicts, kind, cmd, deadline */ -}}
{{- $a := . -}}
{{- toJson (dict
    "apiVersion" "batch/v1"
    "kind" "Job"
    "metadata" (dict "labels" (dict "app.kubernetes.io/part-of" "polyptic" "app.kubernetes.io/component" (printf "image-%s" $a.kind)))
    "spec" (dict
      "backoffLimit" 0
      "activeDeadlineSeconds" $a.deadline
      "ttlSecondsAfterFinished" $a.ttl
      "template" (dict
        "metadata" (dict "labels" (dict "app.kubernetes.io/part-of" "polyptic" "app.kubernetes.io/component" (printf "image-%s" $a.kind)))
        "spec" (dict
          "restartPolicy" "Never"
          "nodeSelector" $a.nodeSelector
          "tolerations" $a.tolerations
          "affinity" $a.affinity
          "initContainers" (list $a.payload)
          "containers" (list (dict
            "name" "rebuild"
            "image" $a.jobImage
            "command" (list "bash" "-c" $a.cmd)
            "env" $a.env
            "securityContext" (dict "privileged" true)
            "resources" $a.resources
            "volumeMounts" $a.mounts))
          "volumes" $a.volumes))))
-}}
{{- end }}
{{- if .Values.imageUpdates.enabled }}
{{- $arch := .Values.imageUpdates.arch }}
{{- $depotImage := printf "/depot/image/%s" $arch }}
{{- $nodeSelector := merge (dict "kubernetes.io/arch" $arch) .Values.imageUpdates.nodeSelector }}
{{- $payload := dict
      "name" "payload"
      "image" (include "polyptic.image" .)
      "imagePullPolicy" .Values.image.pullPolicy
      "command" (list "sh" "-c" "mkdir -p /repo/deploy && cp -a /app/deploy/. /repo/deploy/ && ls /repo/deploy")
      "volumeMounts" (list (dict "name" "repo" "mountPath" "/repo"))
}}
{{- $volumes := list
      (dict "name" "repo" "emptyDir" (dict))
      (dict "name" "scratch" "emptyDir" (dict))
      (dict "name" "depot" "persistentVolumeClaim" (dict "claimName" (include "polyptic.depot.pvcName" .)))
}}
{{- $mounts := list
      (dict "name" "repo" "mountPath" "/repo")
      (dict "name" "scratch" "mountPath" "/var/tmp")
      (dict "name" "depot" "mountPath" "/depot")
}}
{{- /* The depot PVC is ReadWriteOnce by default: the Job MUST land on the node
       already holding the volume (the server's node), or it wedges unschedulable.
       Required pod affinity to the server pod guarantees that; RWX storage makes
       it merely redundant. */}}
{{- $affinity := dict "podAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (list (dict
      "labelSelector" (dict "matchLabels" (dict "app.kubernetes.io/name" (include "polyptic.name" .) "app.kubernetes.io/instance" .Release.Name))
      "topologyKey" "kubernetes.io/hostname")))
}}
{{- /* The address BAKED into the downloadable media (dongle + live ISO). Explicit value wins;
       else the plain-http bootHost when the IngressRoute is on; else empty -> media skipped. */}}
{{- $bakeBase := .Values.imageUpdates.bakeBase }}
{{- if and (not $bakeBase) .Values.ingressRoute.enabled .Values.ingressRoute.bootHost }}
{{- $bakeBase = printf "http://%s" .Values.ingressRoute.bootHost }}
{{- end }}
{{- /* The live ISO bakes the enrolment token into its cmdline; the Jobs read it from the
       chart-managed Secret (optional: open-enrollment deploys simply skip the ISO). */}}
{{- $env := list (dict "name" "POLYPTIC_BOOTSTRAP_TOKEN" "valueFrom" (dict "secretKeyRef" (dict "name" (include "polyptic.secretName" .) "key" "POLYPTIC_BOOTSTRAP_TOKEN" "optional" true))) }}
{{- $refreshCmd := printf `set -eu; export DEBIAN_FRONTEND=noninteractive TMPDIR=/var/tmp; apt-get update -qq; apt-get install -y -qq squashfs-tools rsync xorriso cpio zstd python3 >/dev/null; OUT_DIR=%[1]s bash /repo/deploy/refresh-live-image.sh %[2]s; ISO=/depot/cache/$(basename %[3]s); if [ -f "$ISO" ] && [ -n "%[4]s" ] && [ -n "${POLYPTIC_BOOTSTRAP_TOKEN:-}" ]; then echo "==> refresh the downloadable live ISO (console download)"; BASE_ISO="$ISO" PAYLOAD=%[1]s/polyptic.iso OUT=%[1]s/polyptic-live.iso POLYPTIC_BASE=%[4]s POLYPTIC_TOKEN="$POLYPTIC_BOOTSTRAP_TOKEN" bash /repo/deploy/build-live-iso.sh %[2]s; else echo "skipping downloadable live ISO (no cached base ISO, no bakeBase, or open enrollment)"; fi` $depotImage $arch (include "polyptic.baseIsoUrl" .) $bakeBase }}
{{- $fullCmd := printf `set -eu; export DEBIAN_FRONTEND=noninteractive TMPDIR=/var/tmp; apt-get update -qq; apt-get install -y -qq squashfs-tools rsync xorriso cpio zstd python3 sbsigntool curl ca-certificates mtools binutils xz-utils >/dev/null; mkdir -p /depot/cache /depot/boot; ISO=/depot/cache/$(basename %[3]s); [ -f "$ISO" ] || { echo "downloading %[3]s"; curl -fL -o "$ISO.part" %[3]s && mv "$ISO.part" "$ISO"; }; OUT_DIR=%[1]s BASE_ISO="$ISO" bash /repo/deploy/build-live-image.sh %[2]s; if [ -n "%[4]s" ] && [ -n "${POLYPTIC_BOOTSTRAP_TOKEN:-}" ]; then echo "==> downloadable live ISO (console download)"; BASE_ISO="$ISO" PAYLOAD=%[1]s/polyptic.iso OUT=%[1]s/polyptic-live.iso POLYPTIC_BASE=%[4]s POLYPTIC_TOKEN="$POLYPTIC_BOOTSTRAP_TOKEN" bash /repo/deploy/build-live-iso.sh %[2]s; else echo "skipping downloadable live ISO (no bakeBase or open enrollment)"; fi; if [ -n "%[4]s" ]; then echo "==> boot medium (console download)"; POLYPTIC_BASE=%[4]s bash /repo/deploy/build-boot-medium.sh; cp -f /repo/deploy/dist/boot/* /depot/boot/; else echo "skipping boot medium (no bakeBase)"; fi` $depotImage $arch (include "polyptic.baseIsoUrl" .) $bakeBase }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "polyptic.fullname" . }}-rebuild-jobs
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
data:
  refresh.json: |-
    {{ include "polyptic.rebuildJob" (dict "kind" "refresh" "env" $env "cmd" $refreshCmd "deadline" 1800 "ttl" (int .Values.imageUpdates.ttlSecondsAfterFinished) "jobImage" .Values.imageUpdates.jobImage "payload" $payload "volumes" $volumes "mounts" $mounts "nodeSelector" $nodeSelector "tolerations" .Values.imageUpdates.tolerations "affinity" $affinity "resources" .Values.imageUpdates.jobResources) }}
  full.json: |-
    {{ include "polyptic.rebuildJob" (dict "kind" "full" "env" $env "cmd" $fullCmd "deadline" 2400 "ttl" (int .Values.imageUpdates.ttlSecondsAfterFinished) "jobImage" .Values.imageUpdates.jobImage "payload" $payload "volumes" $volumes "mounts" $mounts "nodeSelector" $nodeSelector "tolerations" .Values.imageUpdates.tolerations "affinity" $affinity "resources" .Values.imageUpdates.jobResources) }}
{{- end }}
