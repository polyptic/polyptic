{{- /*
POL-148 — chrony.conf for the bundled NTP server.

Two modes, by `ntp.upstream`:
  * EMPTY (default) — a SELF-CONTAINED time source for an air-gapped wall fleet: no `server`/`pool`
    line, so chronyd never reaches for the internet. `local stratum <n>` makes it an authoritative
    reference that serves this pod's (node's) own clock, which on any real cluster is itself
    NTP-disciplined — good enough to pull a free-running box off its RTC. The Deployment runs
    `chronyd -x`, so it serves time but never touches the container's own clock.
  * SET — chronyd chains to the real upstream(s), disciplines its own clock to them, and serves THAT
    (a real stratum-2+). `local stratum <n>` stays as the ORPHAN fallback used only when every
    upstream is unreachable. The Deployment then drops `-x` and gains CAP_SYS_TIME (see the note in
    values.yaml: it adjusts the node clock).

`allow` admits clients (the Traefik UDP route is the real boundary; see the values note).
*/ -}}
{{- if .Values.ntp.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "polyptic.fullname" . }}-ntp
  labels:
    {{- include "polyptic.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntp
data:
  chrony.conf: |
    # Managed by the Polyptic chart (POL-148). Do not edit in-cluster; change values.ntp instead.
    {{- if .Values.ntp.upstream }}
    # Real upstream time source(s): chronyd disciplines to these and serves their stratum.
    {{- range .Values.ntp.upstream }}
    server {{ . }} iburst
    {{- end }}
    # Correct a large initial offset in one step rather than slewing for hours.
    makestep 1.0 3
    {{- end }}
    # A LOCAL reference clock. {{ if .Values.ntp.upstream }}Orphan FALLBACK when the upstream is unreachable.{{ else }}The sole source — serves this node's own clock as authoritative.{{ end }}
    local stratum {{ .Values.ntp.stratum | int }}
    {{- range .Values.ntp.allow }}
    allow {{ . }}
    {{- end }}
    # POL-151: the image entrypoint (which would create /run/chrony) is BYPASSED, and the
    # pod runs capped (drop ALL, only NET_BIND_SERVICE — no CAP_CHOWN), so chronyd can
    # neither create nor chown its default /run/chrony. Keep it out of that dir entirely:
    #  * stay root (don't drop privileges → chronyd never chowns a runtime dir), and
    #  * put the pidfile and command socket in the already-mounted, writable state volume.
    user root
    pidfile /var/lib/chrony/chronyd.pid
    # Confine the command port to the loopback and move its Unix socket into the state dir
    # (chronyc from inside the pod only — the server itself needs no external control).
    bindcmdaddress 127.0.0.1
    bindcmdaddress /var/lib/chrony/chronyd.sock
    driftfile /var/lib/chrony/drift
    dumpdir /var/lib/chrony
{{- end }}
