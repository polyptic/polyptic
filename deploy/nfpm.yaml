# deploy/nfpm.yaml — nFPM packaging for the Polyptic agent (https://nfpm.goreleaser.com).
#
# Builds BOTH a .deb (Debian/Ubuntu — the hardware, D27) and a .rpm (Fedora/RHEL/openSUSE) from one
# config and one compiled binary. ${ARCH} and ${VERSION} are supplied by deploy/build-agent.sh
# (nfpm expands ${VAR} from the environment):
#
#   ARCH=amd64 VERSION=0.1.0 nfpm package --config deploy/nfpm.yaml --packager deb --target deploy/dist/
#   ARCH=amd64 VERSION=0.1.0 nfpm package --config deploy/nfpm.yaml --packager rpm --target deploy/dist/
#
# D26: delivery is an installable PACKAGE, not a mandatory image. All real provisioning lives in the
# binary's `setup` subcommand (distro-aware apt/dnf/pacman); the maintainer scripts here are thin
# glue (systemd wiring + kicking off `polyptic-agent setup`). One source of truth, generic across
# package managers — "apt install = the box is a display; the console = what it shows."

name: polyptic-agent
arch: "${ARCH}"            # amd64 | arm64 (nfpm maps rpm → x86_64 | aarch64)
platform: linux
version: "${VERSION}"
version_schema: semver
release: "1"
section: misc
priority: optional
maintainer: "Polyptic Maintainers <maintainers@polyptic.example>"
vendor: "Polyptic"
homepage: "https://github.com/polyptic/polyptic"
license: "Proprietary"
description: |
  Polyptic on-device agent — turns a stock Ubuntu Server-minimal box into a managed display-wall
  kiosk. Reconciles desired state from the control plane over an outbound WebSocket and drives a
  kiosk Chromium per output. Installing this package provisions the zero-click cold-boot chain
  (greetd autologin -> sway -> systemd-supervised agent -> Chromium-per-output) via
  `polyptic-agent setup`. Chromium itself is installed by setup as a real .deb/.rpm (NOT the snap).

# Runtime dependencies. Chromium is intentionally ABSENT: on Ubuntu the `chromium` /
# `chromium-browser` packages are snap shims (slow cold-start, confined profiles — D27), so
# `polyptic-agent setup` installs a real .deb/.rpm Chromium (or the cog/WPE fallback) itself.
depends:
  - greetd
  - sway
  - grim
  - wayvnc

overrides:
  deb:
    depends:
      - greetd
      - sway
      - grim
      - wayvnc
      - dbus-user-session     # systemd --user + D-Bus activation for the in-session agent
      - fonts-dejavu-core     # a baseline font so kiosk pages render text
      - plymouth              # branded boot splash (logo + version + live status) — POL-7
      - librsvg2-bin          # rsvg-convert: rasterise the (swappable) SVG logo to PNG for Plymouth
    recommends:
      - i3-wm                 # x11-i3 fallback backend (NVIDIA / wlroots-unfriendly GPUs, D9)
      - scrot                 # x11 capture (grim is wayland-only)
      - imagemagick           # x11 capture fallback (`import`)
    suggests:
      - polyptic-server
  rpm:
    depends:
      - greetd
      - sway
      - grim
      - wayvnc
      - dbus-daemon           # systemd --user + D-Bus activation for the in-session agent
      - dejavu-sans-fonts     # a baseline font so kiosk pages render text
      - plymouth              # branded boot splash (logo + version + live status) — POL-7
      - plymouth-scripts      # plymouth-set-default-theme + the `script` plugin
      - librsvg2-tools        # rsvg-convert: rasterise the (swappable) SVG logo to PNG for Plymouth
    recommends:
      - i3                    # x11-i3 fallback backend (NVIDIA / wlroots-unfriendly GPUs, D9)
      - scrot                 # x11 capture (grim is wayland-only)
      - ImageMagick           # x11 capture fallback (`import`)

# Maintainer scripts (same files for deb + rpm; nfpm installs them as the packager-native hooks and
# makes them executable). They only wire systemd + kick off `polyptic-agent setup`.
scripts:
  postinstall: deploy/agent/scripts/postinstall.sh
  preremove: deploy/agent/scripts/preremove.sh
  postremove: deploy/agent/scripts/postremove.sh

contents:
  # The compiled single binary (built by deploy/build-agent.sh for ${ARCH}).
  - src: deploy/dist/polyptic-agent-${ARCH}
    dst: /usr/bin/polyptic-agent
    file_info:
      mode: 0755

  # systemd units (fixed content -> package-owned; `setup` only enables/starts them).
  #   * the --user reconciler that drives Chromium-per-output inside the sway session
  #   * a system oneshot that completes the package-manager half of `setup` on first boot
  #     (the package-manager lock is held during install, so Chromium can't be fetched there).
  - src: deploy/agent/templates/polyptic-agent.service
    dst: /usr/lib/systemd/user/polyptic-agent.service
    file_info:
      mode: 0644
  - src: deploy/agent/templates/polyptic-agent-firstboot.service
    dst: /usr/lib/systemd/system/polyptic-agent-firstboot.service
    file_info:
      mode: 0644

  # Config seed. The LIVE file (/etc/polyptic/agent.toml) is written by `setup` (or copied from
  # this .example and edited); this .example is documentation, refreshed on upgrade.
  - src: deploy/agent/templates/agent.toml.example
    dst: /etc/polyptic/agent.toml.example
    file_info:
      mode: 0644

  # Generation templates that `polyptic-agent setup` reads + substitutes (kiosk user, detected
  # outputs) when it writes the host-specific live configs -> single source of truth, no drift.
  - src: deploy/agent/templates/greetd-config.toml
    dst: /usr/share/polyptic/templates/greetd-config.toml
    file_info:
      mode: 0644
  - src: deploy/agent/templates/sway-config
    dst: /usr/share/polyptic/templates/sway-config
    file_info:
      mode: 0644

  # Ensure the config dir exists (root-owned). /var/lib/polyptic is created by `setup` instead, so
  # it can be chowned to the kiosk user (which does not exist until setup creates it).
  - dst: /etc/polyptic
    type: dir
    file_info:
      mode: 0755
