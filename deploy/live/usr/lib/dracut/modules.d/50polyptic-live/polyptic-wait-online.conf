# Polyptic (POL-35): bound the initramfs network wait.
#
# dracut's own drop-in (99-dracut.conf) keeps systemd-networkd-wait-online's stock semantics —
# wait for EVERY managed link — under a TimeoutStartSec of 120. A kiosk box with a second,
# unplugged NIC (or a WiFi card whose firmware the curated set doesn't carry) therefore burned the
# full two minutes on a silent "Starting up" splash before the image download even started, and
# the unit still FAILED (seen on the first real-hardware boot, 2026-07-10). One online link is all
# netboot needs: --any. Same reasoning as the rootfs overlay's 10-any-iface.conf, initramfs edition.
#
# This file sorts after 99-dracut.conf (d < p), so its settings win.
[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any --timeout=45
TimeoutStartSec=60
