# Polyptic (POL-35, revised POL-76): bound the initramfs network wait.
#
# dracut's own drop-in (99-dracut.conf) keeps systemd-networkd-wait-online's stock semantics —
# wait for EVERY managed link, routable — under a TimeoutStartSec of 120.
#
# The PRIMARY multi-NIC fix now lives in 10-polyptic-netboot.network (RequiredForOnline=no on wired
# links), which is what stops an unplugged NIC blocking network-online.target. This drop-in is the
# BACKSTOP: it bounds the wait when a link legitimately IS required — a Wi-Fi-only box, where the
# wlan interface keeps the default (required) and wait-online must wait for wpa_supplicant to
# associate + DHCP. --any lets the first such link satisfy the target; --timeout caps a genuine
# single-link failure at a few tens of seconds instead of the stock two minutes; and because the wired
# links are no longer required, on a wired box this returns immediately and livenet's `online` hook
# fetches the moment the plugged NIC is routable.
#
# This file sorts after 99-dracut.conf (d < p), so its settings win.
[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any --timeout=30
TimeoutStartSec=45
