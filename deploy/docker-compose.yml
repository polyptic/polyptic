# Polyptic — dev infrastructure + optional container stack
#
# ─────────────────────────────────────────────────────────────────────────────
# TWO WAYS TO USE THIS FILE
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. DEV (the normal loop) — Postgres in Docker, everything else on the host:
#
#        bun run db:up      # starts ONLY the `db` service (Postgres 16)
#        bun run dev        # server :8080 + player :5173 + admin :5174 + agent
#
#    The host processes connect to Postgres on localhost:5432 via
#        DATABASE_URL=postgres://polyptic:polyptic@localhost:5432/polyptic  (the server's default)
#    Stop Postgres with `bun run db:down` (data survives in the `pgdata` volume; add `-v` to wipe).
#
# 2. FULL (container-portable, prod-like) — Postgres AND the server in Docker:
#
#        docker compose -f deploy/docker-compose.yml --profile full up
#
#    The `server` service lives behind the `full` profile, so plain `up`/`db:up`
#    never builds it. Under the `full` profile it is built from
#    deploy/server.Dockerfile, waits for Postgres to be healthy, and reaches the
#    DB over the compose network at host `db` (not `localhost`). This is the unit
#    you carry to prod — `docker compose --profile full up -d` brings the whole
#    control plane up anywhere Docker runs. (player + admin are dev-only Vite apps
#    and are intentionally not containerised here.)

services:
  db:
    image: postgres:16
    container_name: polyptic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: polyptic
      POSTGRES_PASSWORD: polyptic
      POSTGRES_DB: polyptic
    ports:
      # host:container — exposes the DB to host processes (server/agent) during dev.
      - "5432:5432"
    volumes:
      # Named volume so data survives `docker compose down` (use `down -v` to wipe).
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # `server` waits on this (condition: service_healthy) before it boots.
      test: ["CMD-SHELL", "pg_isready -U polyptic -d polyptic"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    # Optional: only built/started under `--profile full`. Container-portable
    # control plane for prod-like runs. Dev uses `bun run dev` on the host instead.
    profiles: ["full"]
    container_name: polyptic-server
    build:
      # Context is the repo root (one level up from this compose file) so the
      # Dockerfile can copy the whole bun workspace.
      context: ..
      dockerfile: deploy/server.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Reach Postgres over the compose network — host is the `db` service name.
      DATABASE_URL: postgres://polyptic:polyptic@db:5432/polyptic
      PORT: "8080"
      # Persistent registry (the default); the in-memory store is a test-only double.
      STORE: postgres
      # ── Phase 7 — MEDIA ──────────────────────────────────────────────────────
      # Uploaded images/videos are streamed to MEDIA_DIR (a mounted DISK VOLUME,
      # NOT S3/MinIO) and served back over HTTP from GET /media/:id so wall players
      # on other hosts can fetch them. MEDIA_DIR is the in-container mount path of
      # the `polyptic-media` named volume below.
      MEDIA_DIR: /var/lib/polyptic/media
      # Absolute base URL prepended to /media/<id> when an upload becomes a
      # ContentSource.url. MUST be reachable by the players/public wall (so in a
      # real deploy this is your server's public origin, e.g. https://polyptic.example.com).
      MEDIA_PUBLIC_BASE: http://localhost:8080
      # Hard upload ceiling, in bytes (streamed; the request is rejected past this).
      # Default ~200MB.
      MEDIA_MAX_BYTES: "209715200"
    ports:
      - "8080:8080"
    volumes:
      # Named volume for uploaded media; survives `docker compose down`
      # (use `down -v` to wipe). Mounted at MEDIA_DIR inside the container.
      - polyptic-media:/var/lib/polyptic/media

volumes:
  pgdata:
  # Durable store for uploaded images/videos (Phase 7). A plain disk volume —
  # Polyptic deliberately does NOT depend on object storage.
  polyptic-media:
